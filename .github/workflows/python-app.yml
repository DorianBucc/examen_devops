name: Python application

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest bandit pip-audit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Analyse du code avec Linter
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # SAST : analyse du code Python
      - name: Security scan with Bandit
        run: |
          bandit -r . -f json -o bandit-report.json || true

      # Analyse des dépendances : recherche de CVE
      - name: Dependency audit with pip-audit
        run: |
          pip-audit

      # Lancement des Tests unitaires avec PyTest
      - name: Test with pytest
        run: |
          pytest -v